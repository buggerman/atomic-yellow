---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: atomic-yellow
description: Custom Fedora Cosmic Atomic image for Dell Lptops with Broadcom fingerprint support.

base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: "43"

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - grahamwhiteuk/libfprint-tod
      nonfree: rpmfusion

  - type: script
    scripts:
      - broadcom-fingerprint.sh

  - type: dnf
    install:
      packages:
        - libfprint-2-tod1-broadcom
        - libfprint-tod-selinux
        - intel-media-driver
        - libavcodec-freeworld
        - gstreamer1-plugins-bad-freeworld
        - gstreamer1-plugins-ugly
        - gstreamer1-vaapi
        - thermald
        - tlp
        - tlp-rdw

  - type: systemd
    system:
      enabled:
        - thermald.service
        - tlp.service

  - type: signing
