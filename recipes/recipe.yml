---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: atomic-yellow
description: Custom Fedora Cosmic Atomic base image with codecs and power management.

base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: "43"

modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
    install:
      packages:
        - libavcodec-freeworld
        - gstreamer1-plugins-bad-freeworld
        - gstreamer1-plugins-ugly
        - gstreamer1-vaapi
        - thermald
        - tlp
        - tlp-rdw

  - type: systemd
    system:
      enabled:
        - thermald.service
        - tlp.service

  - type: signing
