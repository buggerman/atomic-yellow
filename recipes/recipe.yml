---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: atomic-yellow
description: Custom Fedora Cosmic Atomic image for Dell Lptops with Broadcom fingerprint support.

base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: "43"

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - grahamwhiteuk/libfprint-tod

  - type: script
    scripts:
      - broadcom-fingerprint.sh

  - type: dnf
    install:
      packages:
        - libfprint-2-tod1-broadcom
        - libfprint-tod-selinux

  - type: signing
