name: lint
on:
  push:
    branches:
      - main
    paths:
      - "files/scripts/**"
      - ".github/workflows/lint.yml"
  pull_request:
    branches:
      - main
    paths:
      - "files/scripts/**"
      - ".github/workflows/lint.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck on files/scripts
        run: shellcheck files/scripts/*.sh
